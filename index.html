<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    

<body onclick="goNext()">
  <!--Landing HTML-->

<div id="landing">
  <div class="landing-bg"></div>
  <div class="particle-field" id="particleField"></div>

  <!-- Floating career icons -->
  <div class="floating-object obj-engineering" data-depth="0.04">
    <div class="gear-wrap">
      <div class="gear gear-big"></div>
      <div class="gear gear-small"></div>
      <div class="spark" style="--sx:12px;--sy:-18px"></div>
      <div class="spark" style="--sx:-8px;--sy:-24px;animation-delay:0.6s"></div>
      <div class="spark" style="--sx:20px;--sy:-10px;animation-delay:1.1s"></div>
    </div>
    <div style="font-size:10px;color:rgba(0,255,136,0.5);margin-top:6px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Engineering</div>
  </div>

  <div class="floating-object obj-medical" data-depth="0.03">
    <div class="stethoscope">
      <div class="steth-ear-l"></div>
      <div class="steth-ear-r"></div>
      <div class="steth-arc"></div>
      <div class="steth-tube"></div>
      <div class="steth-head"></div>
    </div>
    <div style="font-size:10px;color:rgba(0,255,136,0.5);margin-top:6px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Medical</div>
  </div>

  <div class="floating-object obj-law" data-depth="0.05">
    <div class="gavel-wrap">
      <div class="gavel-head"></div>
      <div class="gavel-handle"></div>
    </div>
    <div style="font-size:10px;color:rgba(0,204,255,0.5);margin-top:38px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Law</div>
  </div>

  <div class="floating-object obj-tech" data-depth="0.03">
    <div class="terminal">
      <div class="term-bar">
        <div class="term-dot r"></div>
        <div class="term-dot y"></div>
        <div class="term-dot g"></div>
      </div>
      <div class="term-body">
        <span class="term-prompt">$ </span><span id="termText"></span><span class="term-cursor"></span>
      </div>
    </div>
    <div style="font-size:10px;color:rgba(0,255,136,0.5);margin-top:6px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Technology</div>
  </div>

  <div class="floating-object obj-finance" data-depth="0.04">
    <div class="money-stack">
      <div class="bill bill-3">$</div>
      <div class="bill bill-2">$</div>
      <div class="bill bill-1">$ 100</div>
    </div>
    <div style="font-size:10px;color:rgba(0,255,136,0.5);margin-top:48px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Finance</div>
  </div>

  <div class="floating-object obj-design" data-depth="0.05">
    <div class="brush-wrap">
      <div class="brush-handle"></div>
      <div class="brush-ferrule"></div>
      <div class="brush-head"></div>
      <div class="paint-drip"></div>
    </div>
    <div style="font-size:10px;color:rgba(0,204,255,0.5);margin-top:6px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Design</div>
  </div>

  <div class="floating-object obj-network" data-depth="0.03">
    <div class="fiber-wrap">
      <div class="fiber-cable">
        <div class="light-pulse"></div>
      </div>
    </div>
    <div style="font-size:10px;color:rgba(0,204,255,0.5);margin-top:6px;margin-left:-10px;text-align:center;letter-spacing:0.1em;text-transform:uppercase;">Network</div>
  </div>

  <!-- Centre content -->
  <div class="landing-center">
    <div class="core-rings">
      <div class="ring ring-1">
        <div class="tick" style="transform:rotate(0deg) translateX(-50%);transform-origin:bottom center;top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(45deg);top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(90deg);top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(135deg);top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(180deg);top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(225deg);top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(270deg);top:-10px;left:50%;margin-left:-1px;"></div>
        <div class="tick" style="position:absolute;transform-origin:50% 110px;transform:rotate(315deg);top:-10px;left:50%;margin-left:-1px;"></div>
      </div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="core-orb">
        <div class="core-orb-inner"></div>
      </div>
    </div>

    <h1 class="landing-title">
      <span class="white">Path</span><span class="grad">Pilot</span>
    </h1>
    <p class="landing-tagline">Pakistan's 1st Career Guiding Platform</p>
    <p class="landing-sub">Discover your ideal career path — A Project by Ahmad Aizaz.</p>
    <p class="enter-prompt">Click anywhere or press any key to begin</p>
  </div>
</div>

<script>
(function () {
  const landing = document.getElementById('landing');
  let entered = false;

  /* ── Terminal typing effect ── */
  const lines = ['Hello, World!', 'print("PathPilot")', 'npm run dev', 'git push origin'];
  let lineIdx = 0, charIdx = 0, typing = true;
  const termEl = document.getElementById('termText');

  function typeLoop() {
    if (!termEl) return;
    const line = lines[lineIdx];
    if (typing) {
      if (charIdx < line.length) {
        termEl.textContent = line.slice(0, ++charIdx);
        setTimeout(typeLoop, 90 + Math.random() * 60);
      } else {
        typing = false;
        setTimeout(typeLoop, 1400);
      }
    } else {
      if (charIdx > 0) {
        termEl.textContent = line.slice(0, --charIdx);
        setTimeout(typeLoop, 40);
      } else {
        typing = true;
        lineIdx = (lineIdx + 1) % lines.length;
        setTimeout(typeLoop, 300);
      }
    }
  }
  setTimeout(typeLoop, 800);

  /* ── Particles ── */
  const pf = document.getElementById('particleField');
  for (let i = 0; i < 38; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2.5 + 1;
    const isGreen = Math.random() > 0.4;
    const dur = 8 + Math.random() * 14;
    const delay = Math.random() * -20;
    const left = Math.random() * 100;
    const px = (Math.random() - 0.5) * 120;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${left}%;bottom:-10px;
      background:${isGreen ? 'var(--green)' : 'var(--cyan)'};
      box-shadow:0 0 ${size * 3}px ${isGreen ? 'var(--green)' : 'var(--cyan)'};
      opacity:${0.3 + Math.random() * 0.5};
      --px:${px}px;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    pf.appendChild(p);
  }

  /* ── Mouse parallax ── */
  let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
  const floatingObjs = document.querySelectorAll('.floating-object');

  document.addEventListener('mousemove', e => {
    if (entered) return;
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  let rafId;
  function parallaxLoop() {
    if (!entered) {
      targetX += (mouseX - targetX) * 0.06;
      targetY += (mouseY - targetY) * 0.06;
      floatingObjs.forEach(obj => {
        const depth = parseFloat(obj.dataset.depth) || 0.04;
        const tx = targetX * depth * 120;
        const ty = targetY * depth * 80;
        obj.style.transform = `translate(${tx}px, ${ty}px)`;
      });
    }
    rafId = requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop();

  /* ── Hover glow ── */
  floatingObjs.forEach(obj => {
    obj.addEventListener('mouseenter', () => {
      if (!entered) obj.style.filter = 'brightness(1.6) drop-shadow(0 0 16px rgba(0,255,136,0.5))';
    });
    obj.addEventListener('mouseleave', () => {
      obj.style.filter = '';
    });
  });

  /* ── Dismiss (click / keypress) ── */
  function dismiss() {
    if (entered) return;
    entered = true;

    floatingObjs.forEach((obj, i) => {
      const angle = (i / floatingObjs.length) * Math.PI * 2;
      const dist = 280 + Math.random() * 80;
      obj.style.transition = 'transform 0.9s cubic-bezier(0.4,0,0.2,1), opacity 0.7s ease';
      obj.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(1.1)`;
      obj.style.opacity = '0';
    });

    landing.classList.add('exiting');

    setTimeout(() => {
      cancelAnimationFrame(rafId);
      landing.style.display = 'none';
      /* ── Hook your app here ── */
      // e.g. window.location.href = 'app.html';
      // or   document.getElementById('myApp').style.display = 'block';
    }, 850);
  }

  landing.addEventListener('click', dismiss);
  document.addEventListener('keydown', e => {
    if (!entered && e.key !== 'F5' && !e.ctrlKey && !e.metaKey) dismiss();
  });

  //document.body.style.overflow = 'hidden';
})();
function goNext() {
      window.location.href = "main.html";
    }
</script>
<div id="myWindow"></div>

</body>
</html>
